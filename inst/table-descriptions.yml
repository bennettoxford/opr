practices:
  source: "hscic"
  description: "GP practice details including addresses and organisational information. Updated monthly. Contains latest month's data only (but includes closed practices)."
  columns:
    code: "Practice code (e.g., E82084)"
    name: "Practice name (e.g., HATFIELD ROAD SURGERY)"
    address1: "Address line 1 (e.g., 13-15 RUSSELL AVENUE)"
    address2: "Address line 2 (e.g., LONDON COLNEY)"
    address3: "Address line 3 (e.g., LONDON COLNEY)"
    address4: "Address line 4 (town/city) (e.g., HATFIELD)"
    address5: "Address line 5"
    postcode: "Practice postcode (e.g., AL1 3HD)"
    location: "Location of practice in WGS84 format (e.g., 0101000020E6100000F24637A67312CDBF833AED8EDDE14940)"
    ccg_id: "Clinical Commissioning Group identifier (e.g., 06N)"
    pcn_id: "Primary Care Network identifier (e.g., U73966)"
    setting: "Practice setting code (4 = standard GP practice)"
    close_date: "Date practice closed"
    join_provider_date: "Date practice joined CCG"
    leave_provider_date: "Date practice left CCG (or closed)"
    open_date: "Date practice opened"
    status_code: "Practice status code (A=Active, B=Retired, C=Closed, D=Dormant, P=Proposed, U=Unknown)"

normalised_prescribing:
  source: "hscic"
  description: "Normalised view of the main prescribing dataset. Updated monthly. This is the table you'll typically want to query rather than the raw prescribing table."
  columns:
    sha: "Strategic Health Authority code (e.g., QHM)"
    regional_team: "Regional team identifier (e.g., Y63)"
    stp: "Sustainability and Transformation Partnership code (e.g., QHM)"
    pct: "Primary Care Trust code (e.g., 16C)"
    practice: "Practice code (e.g., A81001)"
    bnf_code: "British National Formulary (BNF) code (e.g., 0408010W0BBAKA1)"
    bnf_name: "British National Formulary (BNF) drug name (e.g., Epilim Chrono 300 tablets)"
    items: "Number of items (one item = one appearance on a prescription)"
    net_cost: "Cost of the presentation according to the Drug Tariff"
    actual_cost: "Actual cost including adjustments for bulk purchases, out of pocket expenses, etc. (This is the 'cost' field typically used in queries)"
    quantity: "Number of pills/grams/millilitres/dressings/ampoules prescribed"
    month: "Prescribing month"

practice_statistics:
  source: "hscic"
  description: "Practice-level patient counts by age and gender. Updated monthly. Contains latest month's data only. Also contains calculated population weightings related to prescribing (STAR-PU and ASTRO-PU)."
  columns:
    month: "The month for which practice statistics are recorded"
    male_0_4: "Count of male patients aged 0-4 years"
    female_0_4: "Count of female patients aged 0-4 years"
    male_5_14: "Count of male patients aged 5-14 years"
    female_5_14: "Count of female patients aged 5-14 years"
    male_15_24: "Count of male patients aged 15-24 years"
    female_15_24: "Count of female patients aged 15-24 years"
    male_25_34: "Count of male patients aged 25-34 years"
    female_25_34: "Count of female patients aged 25-34 years"
    male_35_44: "Count of male patients aged 35-44 years"
    female_35_44: "Count of female patients aged 35-44 years"
    male_45_54: "Count of male patients aged 45-54 years"
    female_45_54: "Count of female patients aged 45-54 years"
    male_55_64: "Count of male patients aged 55-64 years"
    female_55_64: "Count of female patients aged 55-64 years"
    male_65_74: "Count of male patients aged 65-74 years"
    female_65_74: "Count of female patients aged 65-74 years"
    male_75_plus: "Count of male patients aged 75 years and over"
    female_75_plus: "Count of female patients aged 75 years and over"
    total_list_size: "Total count of patients registered at the practice"
    astro_pu_cost: "ASTRO-PU (Age, Sex, and Temporary Resident Originated Prescribing Units) cost weighting"
    astro_pu_items: "ASTRO-PU items weighting"
    star_pu: "STAR-PU? as JSON?"
    pct_id: "Primary Care Trust identifier (e.g., 08G)"
    practice: "Practice code (e.g., E86005)"

regional_teams:
  source: "hscic"
  description: "Open and close dates for regional teams"
  columns:
    code: "Regional team code (e.g., Y57)"
    name: "Regional team name (e.g., SOUTH OF ENGLAND COMMISSIONING REGION)"
    open_date: "Open date"
    close_date: "Closing date, NA if still open"
